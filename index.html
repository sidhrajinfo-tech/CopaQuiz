
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Basics Quiz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 10px;
}

.container{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
border:1px solid rgba(255,255,255,0.2);
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
font-weight:600;
}

.question{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
transition:0.3s;
animation:fadeUp 0.6s ease;
}

.question:hover{
transform:translateY(-3px);
}

.question p{
font-weight:500;
margin-bottom:10px;
}

.options label{
display:flex;
align-items:center;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #eee;
cursor:pointer;
transition:0.25s;
}

.options label:hover{
background:#f5f7ff;
border-color:#667eea;
}

.options input{
margin-right:10px;
transform:scale(1.2);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-size:18px;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.correct{
background:#e6ffed !important;
border:2px solid #28a745 !important;
}

.wrong{
background:#ffe6e6 !important;
border:2px solid #ff4d4d !important;
}

#result{
margin-top:30px;
font-size:24px;
text-align:center;
color:white;
font-weight:600;
}

.progress{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00f2fe,#4facfe);
transition:0.4s;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:600px){

.container{
padding:15px;
}

.question{
padding:15px;
}

}

</style>
</head>

const quizForm=document.getElementById("quizForm");

quizData.forEach((data,index)=>{

let qDiv=document.createElement("div");
qDiv.classList.add("question");

let html=`<p>${data.q}</p><div class="options">`;

data.o.forEach((opt,i)=>{

html+=`
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label>
`;

});

html+=`</div>`;

qDiv.innerHTML=html;

quizForm.appendChild(qDiv);

});

function submitQuiz(){

let score=0;

quizData.forEach((data,index)=>{

let selected=document.querySelector(`input[name="q${index}"]:checked`);

let options=document.getElementsByName(`q${index}`);

options.forEach((opt,i)=>{

let label=opt.parentElement;

if(i==data.a){

label.classList.add("correct");

}

if(selected && i==selected.value && i!=data.a){

label.classList.add("wrong");

}

});

if(selected && selected.value==data.a){

score++;

}

});

document.getElementById("result").innerHTML="Your Score: "+score+" / 100";

window.scrollTo(0,document.body.scrollHeight);

}

const totalQuestions = quizData.length;

document.addEventListener("change",function(e){

if(e.target.type==="radio"){

let answered = document.querySelectorAll("input[type=radio]:checked").length;

let percent = (answered / totalQuestions) * 100;

document.getElementById("progressBar").style.width = percent + "%";

}

});
document.getElementById("result").style.animation="fadeUp 0.6s ease";

</script>
