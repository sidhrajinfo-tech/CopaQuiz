let quizData=[];
let totalQuestions=0;

//////////////////////////
//// LOAD QUIZ
//////////////////////////

function loadQuiz(topic){

quizData=quizzes[topic];

totalQuestions=quizData.length;

document.getElementById("topicPage").style.display="none";
document.getElementById("quizPage").style.display="block";

document.getElementById("quizTitle").innerText=topic.toUpperCase()+" Quiz";

const quizForm=document.getElementById("quizForm");

quizForm.innerHTML="";

quizData.forEach((data,index)=>{

let qDiv=document.createElement("div");

qDiv.classList.add("question");

let html=`<p>${data.q}</p><div class="options">`;

data.o.forEach((opt,i)=>{

html+=`

<label>

<input type="radio" name="q${index}" value="${i}">

${opt}

</label>

`;

});

html+="</div>";

qDiv.innerHTML=html;

quizForm.appendChild(qDiv);

});

}

//////////////////////////
//// SUBMIT QUIZ
//////////////////////////

function submitQuiz(){

let score=0;

quizData.forEach((data,index)=>{

let selected=document.querySelector(`input[name="q${index}"]:checked`);

let options=document.getElementsByName(`q${index}`);

options.forEach((opt,i)=>{

let label=opt.parentElement;

if(i==data.a){

label.classList.add("correct");

}

if(selected && i==selected.value && i!=data.a){

label.classList.add("wrong");

}

});

if(selected && selected.value==data.a){

score++;

}

});

document.getElementById("result").innerHTML="Your Score: "+score+" / "+quizData.length;

window.scrollTo(0,document.body.scrollHeight);

}

//////////////////////////
//// PROGRESS BAR
//////////////////////////

document.addEventListener("change",function(e){

if(e.target.type==="radio"){

let answered=document.querySelectorAll("input[type=radio]:checked").length;

let percent=(answered/totalQuestions)*100;

document.getElementById("progressBar").style.width=percent+"%";

}

});

function goHome(){

document.getElementById("quizPage").style.display="none";
document.getElementById("topicPage").style.display="block";

document.getElementById("quizForm").innerHTML="";
document.getElementById("result").innerHTML="";

document.getElementById("progressBar").style.width="0%";

}

</script>
